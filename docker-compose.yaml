services:
  api:
    image: network-analyzer-api
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - "na_uploaded_logs:/app/uploads"
    environment:
      # Defaulting to the docker-compose db service if not provided in .env
      - DATABASE_URL=postgresql://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DB}
      - APP_PASSWORD=${APP_PASSWORD}
      - OPENAI_KEY=${OPENAI_KEY}
    depends_on:
      - db

  frontend:
    image: network-analyzer-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    depends_on:
      - api

  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  na_uploaded_logs:
